<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Catch - Examen Graficación</title>
    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos para que se vea "Bonito" */
        body {
            background: #1a1a1a; /* Fondo oscuro profundo para eliminar lo gris */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        header {
            background: linear-gradient(90deg, #212529 0%, #343a40 100%);
            border-bottom: 3px solid #ffcc00;
            padding: 15px 0;
        }

        /* Contenedor del Canvas */
        .game-container {
            position: relative;
            margin: 20px auto;
            padding: 10px;
            background: #333;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8); /* Sombra para resaltar */
            max-width: 95vw;
        }

        canvas {
            display: block;
            border-radius: 10px;
            cursor: url('assets/img/puntero.png'), crosshair; /* Regla 5 */
            background-color: #000;
            width: 100%;
            height: auto;
        }

        /* Regla 6: Contador estilizado */
        #contador {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            padding: 10px 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Regla 8: Sección de instrucciones pequeña */
        .instrucciones-box {
            background: rgba(255, 204, 0, 0.1);
            border-left: 5px solid #ffcc00;
            color: #ffcc00;
            font-size: 0.9rem;
        }

        footer {
            background: #212529;
            border-top: 1px solid #444;
            padding: 15px 0;
            font-size: 0.8rem;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <header class="container-fluid text-center">
        <div class="container d-flex align-items-center justify-content-center">
            <img src="assets/img/logo.png" alt="Logo" class="me-3" style="height: 60px; filter: drop-shadow(0 0 5px #ffcc00);">
            <h1 class="display-6 fw-bold mb-0 text-warning">Ghost Catch</h1>
        </div>
    </header>

    <section class="container mt-3">
        <div class="instrucciones-box p-2 rounded shadow-sm text-center">
            <strong>¿Cómo jugar?</strong> Haz clic en los fantasmas para atraparlos. Siempre habrá 25 acechando.
        </div>
    </section>

    <main class="flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="game-container">
            <div id="contador" class="badge bg-danger fs-5">
                Objetos eliminados: 0
            </div>
            
            <canvas id="canvas"></canvas>
        </div>
    </main>

    <footer class="container-fluid mt-auto">
        <div class="container text-center text-secondary">
            <p class="mb-1">Examen de Graficación - Segimiento 2</p>
            <p class="mb-0">
                Creado por: <strong>Nancy Jazareth Lugo Cruz</strong> - 23200858 | 
                Profesor: M.T.I. Luis Alejandro Santana Valadez 
            </p>
        </div>
    </footer>

    <script src="colision.js"></script>
</body>
</html>
